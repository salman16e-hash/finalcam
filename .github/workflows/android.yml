name: Master APK Builder (No Draft Errors)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # अब तक का सबसे शातिर तरीका – सीधे root में project बनाएगा
      - name: Clone real project (Draft-free guarantee)
        run: |
          echo "🛠️  अब कोई draft नहीं, सब कुछ खुद जोड़ रहा हूं..."
          
          # अगर settings.gradle सच में गायब है तो बनाओ
          if [ ! -f settings.gradle ]; then
            cat > settings.gradle << 'SETEOF'
pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "FolderCam"
include ':app'
SETEOF
          fi

          # अगर app/build.gradle गायब है तो पूरा बना दो
          if [ ! -f app/build.gradle ]; then
            mkdir -p app
            cat > app/build.gradle << 'APPEOF'
plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.foldercam.manager'
    compileSdk 34

    defaultConfig {
        applicationId "com.foldercam.manager"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
APPEOF
          fi

          echo "✅ ज़रूरी फ़ाइलें तैयार हैं!"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FolderCam-APK
          path: app/build/outputs/apk/debug/app-debug.apk
